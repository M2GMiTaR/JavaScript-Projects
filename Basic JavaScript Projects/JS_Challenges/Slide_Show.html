<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Slide Show</title>
    <!-- Link to CSS -->
    <link rel="stylesheet" href="CSS/style.css">
    <!-- jQuery library -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Link to slideshow JS -->
    <script src="JS/slideshow.js" defer></script>
</head>

<body>
    <h2>Slide Show</h2>

    <!-- Slideshow container -->
    <div id="slideshow">
        <div>
            <img src="images/My_Cats.jpeg" alt="My Cats">
        </div>
        <div>
            <img src="images/thumbnail_1.jpg" alt="Thumbnail 1">
        </div>
        <div>
            <img src="images/thumbnail_2.jpg" alt="Thumbnail 2">
        </div>
        <div>
            <img src="images/thumbnail_8.jpg" alt="Thumbnail 8">
        </div>
    </div>
</body>
</html>
