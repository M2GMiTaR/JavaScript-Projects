<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ondblclick Event Demo</title>
    <style>
        p {
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>ondblclick Event Example</h1>
    <p ondblclick="changeText()">Double-click this paragraph to see the magic!</p>

    <script>
        // Function that will be called on double click
        function changeText() {
            const paragraph = document.querySelector("p");
            paragraph.textContent = "You double-clicked me! 🎉";
            paragraph.style.color = "blue"; // Optional: change color
        }
    </script>
</body>
</html>
