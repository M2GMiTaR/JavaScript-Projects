<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Page title shown in browser tab -->
    <title>Bookmark Challenge</title>

    <!-- Link to external CSS file for styling -->
    <link rel="stylesheet" href="CSS/bookmarks.css">
</head>
<body>

    <!-- NAVBAR: fixed navigation links for bookmarks -->
    <nav class="navbar">
        <!-- Each link's href points to a section's ID -->
        <!-- Clicking a link scrolls to that section -->
        <a href="#section1">Section 1</a>
        <a href="#section2">Section 2</a>
        <a href="#section3">Section 3</a>
    </nav>

    <!-- SECTION 1 -->
    <!-- ID matches the link href -->
    <!-- This allows the browser to jump here when clicked -->
    <div id="section1" class="section">
        <h2>Section 1</h2>
        <p>
            This is the content of section 1.
        </p>
    </div>

    <!-- SECTION 2 -->
    <div id="section2" class="section">
        <h2>Section 2</h2>
        <p>
            This is the content of section 2.
        </p>
    </div>

    <!-- SECTION 3 -->
    <div id="section3" class="section">
        <h2>Section 3</h2>
        <p>
            This is the content of section 3.
        </p>
    </div>

</body>
</html>
